<script>
  const chapters = [
    {
      title: "CHAPTER 1: THE AWAKENING",
      image: "https://cdn.pixabay.com/photo/2023/09/14/10/23/galaxy-8252744_1280.png",
      text: `Yusuf Ali was curled up in a fetal position at the foot of the bed, his hands pressed hard on his ears as if to block out noise, his eyes shut tightly, and he was chanting something furiously. His body shook vigorously as if in the throes of a mighty fever, and his clothes were drenched in sweat.

<p>He prayed for it to stop—everything. The hallucinations, the noise, the continual teleportation—it was all too much, and he was losing his mind. The drilling noise from the construction site sounded as if it were in his head, even though the site was over a mile away from him.</p>

<p>He could even hear the laborers' footsteps and the metal scraping on metal as they went about their duties. But it wasn't just that he could hear it; it was more like he kept teleporting back and forth mentally, placing him right where the sound was. However, the teleportation didn't stop at the construction site; he also weaved in and out of reality, realms, dream states, and wake states.</p>

<p>Sometimes, he found himself underground in caves, where he got stuck and suffocated for a while before reverting to his original location. He was exhausted and suffering from motion sickness, surrounded by his own vomit. And as if that wasn't bad enough, the entities he encountered were all aware of his presence, and they did not like it. They kept attacking him. The only safe place was the room that he was in. Thankfully, they couldn't follow him.</p>

<p>Yusuf Ali had always been a spiritually gifted person. As a child, he used to have some of the most fantastic and vivid dreams, in which he would travel to different realms and worlds and meet all kinds of beings. The dreams were so real that he could swear that he was physically there. When he shared this experience with his parents, he could see the fear in their eyes. They worried about him and sought various kinds of help, but what he possessed was not a problem; it was a gift he was born with. Additionally, he had a knack for reading people's minds—or rather, he could enter their minds and explore. It was something inexplicable, yet he had successfully exposed thieves and liars on several occasions. His parents warned him to stop doing it because it could get him into trouble.</p>

<p>You see, Yusuf grew up in Bauchi State, Nigeria, where people held strong superstitions. It wouldn't take much for them to accuse him of witchcraft or something similar and potentially lynch him. Moreover, the fact that he kept revealing people's misdeeds would undoubtedly anger them and make them want to harm him.</p>

<p>In his teenage years, there was a surge in his abilities, triggered by puberty, and he found himself both losing his mind and performing fantastical feats. To protect him, his parents told everyone that he was on drugs and then sent him to rehab multiple times until he improved and learned to keep quiet about his gifts. He denied his abilities for so long that they seemed to fade away.</p>

<p>However, a week ago, while he was returning to the university hostel, he was struck by an out-of-control car. Although he was physically unharmed, he did hit his head hard on the ground. The doctors examined him for a concussion but found none. Strangely, the accident seems to intensify his abilities to an extraordinary degree—teleportation and visions now occur continuously during his waking state instead of only during sleep. The fabric of reality began to unravel for him, and distinguishing between what was real and what was not became increasingly difficult.</p>

<p>Initially, he began to distract himself by reading, but he would find himself immersed in the book, becoming part of the story, or he would hear someone shouting the words in his ears. Consequently, he stopped reading altogether. The teleportation and hallucinations worsened progressively over time, and by the seventh day, he was unable to stand or open his eyes. Hunger consumed him; he was practically starving as he hadn't eaten anything in several days. His water intake was minimal, leading to severe dehydration, which ironically exacerbated his condition by weakening his body, making it susceptible to possession or other intrusive thoughts.</p>

<p>"Yusuf...Yusuf... Wake up." A gentle tap on his shoulder roused him. Opening his eyes, he saw John Obinna, his friend. "Let me help you." John assisted him in sitting up. "Oh my! You look terrible." Yusuf managed to smile. It was true. He hadn't showered or brushed in over a week, and he had lost a significant amount of weight due to dehydration and starvation.</p>

<p>"I brought pepper soup and maltina for you to eat." John opened the plate, and the smell of the soup went straight to Yusuf's head. He tried to turn away. "No!" John said it quietly but firmly. "You must eat today." With determination, he began spooning the soup into Yusuf's reluctant mouth.</p>

<p>"Oh, John, my dear friend." He thought. John was the only friend who loved him like a brother, never judging or attempting to exploit him after discovering his gifts. They met on the first day of their first year at Base University, Abuja. They were both at the Department of Political Science, trying to register for their courses, and an instant connection formed between them. Yusuf Ali was a Fulani from Bauchi, and John Obinna was an Igbo from Port Harcout, Nigeria. Usually, these two tribes were not known for their close friendship, but Yusuf and John couldn't care less about the tribal divide. They shared a relationship built on love, respect, and a shared sense of silliness. Both were intelligent, and they supported each other in excelling academically.</p>

<p>As time passed, they began visiting each other's homes. During breaks, Yusuf would take John to Bauchi with him, while on other occasions, he would join John and his family in Abuja, where they resided. There was even a Christmas when Yusuf spent the holidays with them, and his parents had no reason to worry because he had an amazing time. He was so nervous when he told John about his abilities. Nervously, Yusuf confided in John about his abilities, expecting him to be scared or mock him. To his surprise, John simply smiled and said, "Cool." As their bond grew stronger, Yusuf became more at ease and even began demonstrating some of his abilities to John. John always offered unwavering support during mini spikes or attacks triggered by Yusuf's gifts, and he kept Yusuf's secrets safe.</p>

<p>When the accident occurred and things began spiraling out of control, John took Yusuf from campus to one of his parent's commercial estates, which had several empty houses. They chose a secluded house at the far end of the estate, amidst other vacant properties for sale, providing an incredibly quiet and suitable environment for Yusuf—or so they believed. It was an incredibly thoughtful gesture. John continued to check on Yusuf morning and night, bringing food and ensuring his well-being. He even obtained permission from the school and completed Yusuf's assignments on his behalf. Truly, John was a blessing in Yusuf's life.</p>

<p>He managed to consume half of the soup and drink some of the Maltina, instantly feeling a significant improvement. However, he soon became aware of another presence in the room. Initially, he dismissed it as his imagination, but now he was certain that someone else was there. The realization made him flinch.</p>

<p>"Oh, sorry. This is my sister, Florence; remember her?" John explained, noticing Yusuf's questioning expression. Yusuf had never met her before. Whenever he visited John's house, she was either abroad or at school. However, he had seen her in their family pictures.</p>

<p>"She knows about everything. I told her... I am sorry. But you need help, and I believe she can assist you. Florence is a first-year student at Nile University, Abuja, and she believes that may be a psychological technique she can use to aid you with your condition." John explained, trying to persuade Yusuf. Nonetheless, Yusuf remained unimpressed, still unsure about this unfamiliar person offering assistance.</p>

<p>"Hey, Yusuf, Nice to finally meet you." She greeted him with a smile, extending her hand to shake his. However, Yusuf did not reciprocate the gesture.</p>

<p>"He doesn't shake women," John explained, laughing.</p>

<p>"Oh, I am sorry," she said, retracting her hand. "Well, I thought we could try a little exercise together. It's something I read in one of my books, and it seems simple enough but promising."</p>

<p>Initially, she felt nervous and slightly offended by Yusuf's silent stare. But then she realized that he had just teleported right before their eyes.</p>

<p>John shook him, but there was no response. "Yep. He is out." He confirmed.</p>

<p>"Oh, my God! Is this normal?" She exclaimed.</p>

<p>"Yeah, that is why I brought him here. Imagine trying to explain this to people," John replied. Thirty minutes later, Yusuf returned with a deep breath, startling them both.</p>

<p>"Where did you go?" She asked curiously, moving closer to him.</p>

<p>Yusuf felt embarrassed and ashamed of his appearance, especially in front of her. He was also aware of his unpleasant odor. However, she seemed unfazed by it all. "I can't explain it, but it was difficult to come back. I am afraid that one of these days I might get stuck," he confessed, covering his ears and wincing in pain.</p>

<p>"What we need to do is figure out how you can control it," she suggested.</p>

<p>"I don't want to control it. I want to get rid of it." He sapped, but she didn't even flinch.</p>

<p>"I don't think you can get rid of it. I believe it's a part of you. What you need to do is learn to adjust and even make it work for you."</p>

<p>"I don't know if I can... He trailed off."</p>

<p>"Trust me, you can." She reassured me with a smile. "It won't be easy, but the technique I am going to use will help."</p>

<p>"Ok." He finally agreed, and John, who had been quietly observing, smiled as well.</p>

<p>She explained to him the technique called "guided visualization." It involved using words to guide his focus solely on her, excluding all other distractions. The goal was to create mental imagery and concentrated attention that would foster a sensory experience in the mind, promoting relaxation. He needed to learn to tune out external noises and solely concentrate on her thoughts. Meanwhile, she would imagine an empty room painted in a calming cornflower white, devoid of windows or doors, neither too dark nor too bright. In this imaginary space, he could find solace, with external noises blocked out, providing a peaceful and quiet environment. The technique aimed to strengthen his brain's ability to focus on her thoughts, building resistance and defense against unwanted noise and intrusion. Guided visualization is widely used in therapeutic practices, including psychology and mind-body medicine, for stress reduction and anxiety relief.</p>

<p>They attempted the technique throughout the day but had little success. He was too physically and mentally exhausted to fully grasp it. However, by evening, they had achieved some progress, allowing him to experience about 15 minutes of relative restfulness.</p>

<p>Encouraged by this small success, both John and Florence decided to stay with him overnight, providing support and attempting the technique again the following day. John went to fetch their clothes and bought them food.</p>

<p>"Thank you for doing this for him." John expressed gratitude to his sister as they sat outside the apartment, taking a few moments for themselves while Yusuf slept.</p>

<p>"It's my pleasure," she replied.</p>

<p>"How's school, by the way? Won't you miss your classes by being here?" John inquired.</p>

<p>"We've finished all our tests, so I'll be fine. Exams are still two weeks away, and I have enough time to study," she assured him. "It seems the security guards called Dad and informed him about Yusuf's presence here. He mentioned that he had been trying to reach you, so he called me. I simply told him that you were spending time with friends here for a while. He asked why you didn't just move here, as he offered you an apartment at Cosgrove, but you refused and chose to stay in the hostel instead."</p>

<p>John was fully aware of the lovely apartment that his father offered him on one of his luxury estates, Cosgrove. The estate was located in Wuye, a highbrow area in Abuja city, and it was one of those modern smart estates where everything was automated. However, he didn't accept because, for one thing, he wanted to experience hostel life and spend time hanging out with his friends. Relatives had already accused him of being a spoilt rich brat, and he knew that staying in a luxury apartment as an undergraduate student would only add fuel to the fire. Moreover, there would be too many eyes on him, reporting his every movement to his father, and he didn't care for that. He already felt like a fish in a bowl, as it were. Ironically, his sister, the only other child of Chief Obinna Okechukwu, was not given the same offer simply because she was a girl. She had the option to either stay in the hostel or at home, and she chose the hostel. It was as close to freedom as she could ever get before getting married. "I will call him back," he smiled. And at that moment, Florence's phone began to ring.</p>

<p>"Oh, sorry," she whispered as she got up and walked far away from the apartment so as not to disturb Yusuf. She had forgotten to put her phone in silent mode. She considered herself lucky that it hadn't rung during the day. As she walked, she glanced at the number calling, and it was her fiancé, Mclean. "Hey, Babe," she answered.</p>

<p>Yusuf lay still in his bed with his eyes closed. He wasn't sleeping, but rather resting. He couldn't afford to sleep for more than a few minutes at a time because he would involuntarily teleport. However, he was beginning to gain control over his waking state. The exercise they had done was wonderful. He even tried to picture the room in his head to achieve the same level of tranquility but with little success. Nevertheless, he could now sense when the involuntary teleportation was about to happen and could fight it, with some hits and misses. He had teleported twice to John and Florence, where he had overheard some of their conversations. He had also teleported to Florence while she was talking on the phone. She seemed so happy and was smiling a lot. It must be her boyfriend. He thought about it and felt a slight pang of jealousy. It was strange since he didn't even know her until today. He had heard of her from her brother and had seen her in their family pictures, but never in person. Yet, the hours they had spent together doing the mental exercise felt like a lifetime to him, and he began to feel something. He pushed the thoughts away, redirecting his focus. Then he began to reminisce about the past.</p>

<p>He remembered some of the fantastic worlds he had visited. Yes, it was scary at times, but he couldn't deny how wonderful it was to explore those places. He had been to all kinds of strange worlds. Some of them floated in the clouds with a hazy ambiance. The houses were situated on floating lands, with entire cities protected by domes. The roads intertwined and looped without people falling off, as gravity seemed to work in a peculiar way there. Other worlds appeared metallic, with engines and beings resembling machines as well. There were towering lands where people, animals, and plants stood at 20 feet tall. He felt like an ant in comparison. Fortunately, they couldn't see him; he was uncertain of what they would do to him if they did. However, his favorite world was called the City of Jute, where he had met Janin. He was nine years old when he teleported to the City of Jute in one of his dreams, and it was the most beautiful place he had ever seen. Everything sparkled and exuded beauty. The structures seemed to be made of gold, silver, diamonds, or other similar materials. Even the people were a sight to behold, exceptionally beautiful and graceful in their movements. The animals were strange, yet captivating and friendly. They immediately sensed his presence upon his arrival but didn't attack him. A furry little creature that resembled a large cat approached him and rubbed against him as he stroked her while she purred.</p>

<p>"What are you?" He was startled by a girl's voice and quickly turned around, inadvertently startling the cat-like creature that ran away. He felt bad. In front of him stood a girl about his age, who was the most beautiful girl he had ever seen. She wore clothes that resembled soft caramel-colored leather, strapped sandals, and a lace veil. Her hair was long, midnight black, and braided with flowers. Her skin was pale white, and her eyes captivated him the most. They were like glass, with the most beautiful shade of green he had ever seen. He couldn't help but stare.</p>

<p>"How did you get here?" she asked again, moving closer to him.</p>

<p>"I don't know," he stammered.</p>

<p>"How could you not know? You must have gotten here somehow. I have never seen your kind here before."</p>

<p>"I am sorry, I will leave," he replied, trying to force himself to wake up. "Please don't hurt me."</p>

<p>"Why would I hurt you? Are you a bad person?"</p>

<p>"No, I am just looking around and admiring your land. I don't even know how I got here. I went to sleep in my bed, and then I am here."</p>

<p>"So, you are dreaming?" Her curiosity was piqued.</p>

<p>"Yes."</p>

<p>"Does this happen a lot?"</p>

<p>"Yes, but I have no control over where I go. I just find myself anywhere."</p>

<p>"Interesting," she smiled. "That must be a nice skill to have."</p>

<p>"Not always, but I like it here," he said, beginning to relax. "What is this place anyway?"</p>

<p>"It is called the Land of Jute. In my language, that means light."</p>

<p>"Wait, how is it that I can understand you?" He realized that he was speaking her language.</p>

<p>"I am wondering the same thing. Perhaps it's part of your abilities to speak the language of the place you find yourself in."</p>

<p>"Perhaps," he agreed. He had never thought of it that way. They continued to talk for a while. She took him around the city, showing him extraordinary things. People stopped to look at them, but no one was upset or hostile. She brought him to her home and introduced him to her parents, who were equally intrigued. Her mother served dinner. It looked and smelled delicious, and even though he didn't know what it was, he wanted to eat it. Just as he was about to take a bite, he woke up.</p>

<p>He tried his best to go back to sleep but couldn't. And for the first time, he felt upset about waking up. A few hours later, his father woke him up to go to the mosque together for prayer.</p>

<p>"What is wrong?" his father asked, noticing the sullen look on his face.</p>

<p>"Nothing, Baba. I just had a bad dream," he replied.</p>

<p>"One of those again?" His father was concerned.</p>

<p>"It's okay, Baba. I am fine." He didn't want to alarm his father by telling him what happened.</p>

<p>"Okay, son. Let's hurry."</p>

<p>He spent the next three days trying to return to the Land of Jute, but with very little success. Everywhere he went, he paled in comparison to the beautiful city made of lights and its gorgeous inhabitants, especially Janin with the glass eyes. He missed her so much and couldn't wait to be reunited with her. However, at this point, it seemed almost impossible. He had never visited the same place twice, as he had no control over where he went.</p>

  function showChapter(index) {

  }

  function goBack() {
    container.innerHTML = '';
    document.getElementById('chapterList').style.display = 'block';
  }

  function renderChapter(index) {
    const chapter = chapters[index];
    const likeKey = `likes_${index}`;
    const commentKey = `comments_${index}`;
    const likes = parseInt(localStorage.getItem(likeKey)) || 0;
    const comments = JSON.parse(localStorage.getItem(commentKey)) || [];

    container.innerHTML = `
      <div class="chapter-full active">
        <div class="chapter-number">${chapter.title.split(':')[0]}</div>
        <h2>${chapter.title}</h2>
        <img src="${chapter.image}" alt="${chapter.title}">
        <div class="chapter-text">${chapter.text}</div>

        <div class="like-comment">
          <button class="like-button" onclick="likeChapter(${index})">❤️ Like (<span id="likeCount${index}">${likes}</span>)</button>

          <div class="comments">
            <textarea id="commentInput${index}" placeholder="Share your thoughts about this chapter..."></textarea>
            <button onclick="addComment(${index})">Post Comment</button>
            <div class="comment-list" id="commentList${index}">
              ${comments.map(c => `<div class="comment">${c}</div>`).join('')}
            </div>
          </div>
        </div>

        <div class="button-row">
          <button class="back-button" onclick="goBack()">← Back to Series</button>
          <button class="btn" onclick="showChapter(${(index + 1) % chapters.length})">Next Chapter →</button>
        </div>
      </div>
    `;
  }

  function likeChapter(index) {
    const key = `likes_${index}`;
    let count = parseInt(localStorage.getItem(key)) || 0;
    count++;
    localStorage.setItem(key, count);
    document.getElementById(`likeCount${index}`).innerText = count;
  }

  function addComment(index) {
    const input = document.getElementById(`commentInput${index}`);
    const list = document.getElementById(`commentList${index}`);
    const key = `comments_${index}`;

    if (input.value.trim() !== "") {
      comments.push(input.value.trim());
      localStorage.setItem(key, JSON.stringify(comments));
